name: CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build-and-check:
    name: build + lint + core-purity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Biome (lint + format check, informational)
        continue-on-error: true
        run: pnpm exec biome check . --max-diagnostics=200

  biome-changed:
    name: Biome on changed files (HARD for new code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Determine base ref
        id: base
        run: echo "base=${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}" >> "$GITHUB_OUTPUT"

      - name: Biome on changed files
        run: |
          changed=$(git diff --name-only --diff-filter=ACMR "${{ steps.base.outputs.base }}" HEAD -- '*.ts' '*.tsx' '*.js' '*.json' | tr '\n' ' ')
          if [ -z "$changed" ]; then
            echo "No relevant changed files."
            exit 0
          fi
          echo "Checking: $changed"
          pnpm exec biome check $changed
